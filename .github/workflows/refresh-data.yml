name: Refresh heatmap data

on:
  schedule:
    # ── TEST SLOT ──
    # 02:30 UTC = 12:30 PM AEST today. Once we confirm scheduled runs
    # work, we'll switch to production schedule (8 AM AEST = 22:00 UTC).
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      strict_pii:
        description: 'Fail run if any PII patterns are detected in summaries'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          ZOHO_DC:            'com'
          ZOHO_CLIENT_ID:     ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          STRICT_PII: ${{ github.event.inputs.strict_pii == 'true' && '1' || '0' }}
        run: python -m scripts.main

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add private/master.json public/data/heatmap.json public/data/meta.json
          git diff --staged --quiet || git commit -m "data: refresh [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sS -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"❌ NZF heatmap refresh failed. https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$SLACK_WEBHOOK_URL"
          fi
